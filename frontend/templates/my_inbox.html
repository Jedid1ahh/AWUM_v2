<div class="container-fluid py-3 my-inbox-page">
  <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
    <div>
      <h2 class="mb-1"><i class="bi bi-inbox-fill"></i> My Inbox</h2>
      <p class="text-muted mb-0">One approval queue for AI pitches, booking calls, fallout, and cross-system decisions.</p>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <select id="myInboxStatus" class="form-select form-select-sm" style="width:auto" onchange="window.loadMyInbox()">
        <option value="pending">Pending</option>
        <option value="all">All</option>
        <option value="approved">Approved</option>
        <option value="countered">Countered</option>
        <option value="rejected">Rejected</option>
        <option value="dismissed">Dismissed</option>
      </select>
      <button class="btn btn-sm btn-outline-primary" onclick="window.loadMyInbox()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="window.autoResolveMyInbox()">Auto-resolve due</button>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>Ask the LLM for a pitch</span>
      <small id="llmProviderStatus" class="text-muted">Checking provider…</small>
    </div>
    <div class="card-body">
      <div class="input-group">
        <input id="llmPitchPrompt" class="form-control" placeholder="Suggest a match, feud payoff, promo beat, talent response, or finance move…">
        <button class="btn btn-warning" onclick="window.createLLMPitch()"><i class="bi bi-stars"></i> Create Pitch</button>
      </div>
      <div class="form-text">The pitch is added to this same approval queue. Nothing major is applied until you approve it.</div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-3">
      <div class="card">
        <div class="card-header">Queue Pulse</div>
        <div class="card-body" id="myInboxCounts"><p class="text-muted mb-0">Loading…</p></div>
      </div>
    </div>
    <div class="col-lg-9">
      <div id="myInboxStatusBanner" class="alert py-2" style="display:none"></div>
      <div id="myInboxList"></div>
    </div>
  </div>
</div>

<style>
.my-inbox-page .approval-card { border: 1px solid rgba(255,255,255,.14); border-radius: 10px; padding: 1rem; margin-bottom: .8rem; background: rgba(255,255,255,.025); }
.my-inbox-page .approval-title { font-weight: 800; font-size: 1.05rem; }
.my-inbox-page .approval-meta { font-size: .8rem; color: var(--txt-dim, #888); }
.my-inbox-page .json-preview { font-size: .75rem; max-height: 160px; overflow: auto; background: rgba(0,0,0,.18); border-radius: 6px; padding: .6rem; }
</style>

<script>
(() => {
  function unwrap(response) { return response && response.success && response.data !== undefined ? response.data : response; }
  function esc(value) { return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
  function badge(priority) {
    var cls = priority === 'critical' || priority === 'urgent' ? 'danger' : priority === 'high' ? 'warning text-dark' : priority === 'opportunity' ? 'info text-dark' : 'secondary';
    return `<span class="badge bg-${cls}">${esc(priority || 'medium')}</span>`;
  }
  function setBanner(message, type) {
    var el = document.getElementById('myInboxStatusBanner');
    if (!el) return;
    el.className = 'alert alert-' + (type || 'secondary') + ' py-2';
    el.innerHTML = message;
    el.style.display = 'block';
  }
  function renderCounts(data) {
    var counts = data.counts_by_category || {};
    var entries = Object.entries(counts);
    document.getElementById('myInboxCounts').innerHTML = entries.length
      ? entries.map(([key, value]) => `<div class="d-flex justify-content-between"><span>${esc(key)}</span><strong>${value}</strong></div>`).join('')
      : '<p class="text-muted mb-0">No items in this view.</p>';
  }
  function renderItems(items) {
    var list = document.getElementById('myInboxList');
    if (!items || !items.length) {
      list.innerHTML = '<div class="card"><div class="card-body text-muted">No approval items match this filter.</div></div>';
      return;
    }
    list.innerHTML = items.map(item => {
      var recommendation = item.recommendation_json || {};
      return `<div class="approval-card">
        <div class="d-flex justify-content-between gap-2">
          <div class="approval-title">${esc(item.title)}</div>
          ${badge(item.priority)}
        </div>
        <div class="approval-meta mb-2">${esc(item.source_type)} · ${esc(item.category)} · ${esc(item.status)} · due Y${esc(item.deadline_year || '-')} W${esc(item.deadline_week || '-')}</div>
        <p>${esc(item.summary)}</p>
        <details class="mb-3"><summary>Recommendation data</summary><pre class="json-preview">${esc(JSON.stringify(recommendation, null, 2))}</pre></details>
        ${item.status === 'pending' ? `<div class="btn-group btn-group-sm">
          <button class="btn btn-success" onclick="window.decideMyInbox('${esc(item.id)}','approve')">Approve</button>
          <button class="btn btn-warning" onclick="window.decideMyInbox('${esc(item.id)}','counter')">Counter</button>
          <button class="btn btn-danger" onclick="window.decideMyInbox('${esc(item.id)}','reject')">Reject</button>
          <button class="btn btn-outline-secondary" onclick="window.decideMyInbox('${esc(item.id)}','dismiss')">Dismiss</button>
        </div>` : '<span class="badge bg-secondary">Resolved</span>'}
      </div>`;
    }).join('');
  }
  window.loadMyInbox = async function() {
    var status = document.getElementById('myInboxStatus').value;
    var data = unwrap(await fetchAPI('/api/booker/inbox?status=' + encodeURIComponent(status) + '&limit=100'));
    renderCounts(data);
    renderItems(data.items || []);
  };
  window.decideMyInbox = async function(id, decision) {
    var counter = decision === 'counter' ? (prompt('Counter-pitch:', 'Keep the idea, but adjust the execution.') || '') : '';
    await fetchAPI('/api/booker/approval-queue/' + encodeURIComponent(id) + '/decision', {
      method: 'POST',
      body: JSON.stringify({ decision, counter_pitch: counter, notes: 'Handled from My Inbox: ' + decision })
    });
    setBanner('Updated approval item.', 'success');
    await window.loadMyInbox();
  };
  window.autoResolveMyInbox = async function() {
    var result = unwrap(await fetchAPI('/api/booker/approval-queue/auto-resolve', { method: 'POST', body: JSON.stringify({}) }));
    setBanner('Auto-resolved ' + (result.resolved || 0) + ' due item(s).', 'success');
    await window.loadMyInbox();
  };
  window.createLLMPitch = async function() {
    var prompt = document.getElementById('llmPitchPrompt').value.trim();
    if (!prompt) { setBanner('Enter a pitch request first.', 'warning'); return; }
    setBanner('Creating LLM pitch…', 'info');
    var result = unwrap(await fetchAPI('/api/booker/llm/proposals', {
      method: 'POST',
      body: JSON.stringify({ prompt, context: { source_page: 'my_inbox' } })
    }));
    document.getElementById('llmPitchPrompt').value = '';
    setBanner('Pitch queued: <strong>' + esc((result.approval || {}).title || 'LLM Pitch') + '</strong>', 'success');
    await window.loadMyInbox();
  };
  async function loadProviderStatus() {
    try {
      var status = unwrap(await fetchAPI('/api/booker/llm/status'));
      document.getElementById('llmProviderStatus').textContent = 'Provider: ' + status.primary;
    } catch (err) {
      document.getElementById('llmProviderStatus').textContent = 'Provider unavailable';
    }
  }
  loadProviderStatus();
  window.loadMyInbox();
})();
</script>
